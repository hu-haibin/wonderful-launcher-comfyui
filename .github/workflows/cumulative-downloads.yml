name: Update Cumulative Downloads

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: cumulative-downloads
  cancel-in-progress: false

jobs:
  update-download-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh cumulative download stats
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: hu-haibin
          REPO: wonderful-launcher-comfyui
          STATS_FILE: stats/downloads.json
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "wonderful-launcher-comfyui-download-stats"
          }

          $perPage = 100
          $page = 1
          $releases = @()

          while ($true) {
            $uri = "https://api.github.com/repos/$env:OWNER/$env:REPO/releases?per_page=$perPage&page=$page"
            $response = Invoke-RestMethod -Uri $uri -Headers $headers
            $batch = @($response | ForEach-Object { $_ })
            if ($batch.Count -eq 0) {
              break
            }

            $releases += $batch

            if ($batch.Count -lt $perPage) {
              break
            }

            $page += 1
          }

          $visibleAssetTotal = 0
          $visibleProductTotal = 0
          $visibleChecksumTotal = 0
          $visibleAssetCount = 0
          $visibleProductAssetCount = 0
          $visibleChecksumAssetCount = 0

          foreach ($release in $releases) {
            foreach ($asset in $release.assets) {
              $downloadCount = [int]$asset.download_count
              $name = [string]$asset.name

              $visibleAssetTotal += $downloadCount
              $visibleAssetCount += 1

              if ($name -match '(?i)(sha256|checksum)') {
                $visibleChecksumTotal += $downloadCount
                $visibleChecksumAssetCount += 1
              } elseif ($name -match '(?i)\.(exe|zip|msi)$') {
                $visibleProductTotal += $downloadCount
                $visibleProductAssetCount += 1
              }
            }
          }

          $state = @{
            cumulative_asset_downloads = $visibleAssetTotal
            cumulative_product_downloads = $visibleProductTotal
            last_seen_asset_total = $visibleAssetTotal
            last_seen_product_total = $visibleProductTotal
          }

          if (Test-Path $env:STATS_FILE) {
            $state = Get-Content $env:STATS_FILE -Raw | ConvertFrom-Json -AsHashtable
          }

          $archivedAssetTotal = [int]($state.archived_asset_downloads ?? 0)
          $archivedProductTotal = [int]($state.archived_product_downloads ?? 0)
          $archivedChecksumTotal = [int]($state.archived_checksum_downloads ?? 0)
          $archivedReleaseCount = [int]($state.archived_release_count ?? 0)
          $archivedAssetCount = [int]($state.archived_asset_count ?? 0)
          $archivedProductAssetCount = [int]($state.archived_product_asset_count ?? 0)
          $archivedChecksumAssetCount = [int]($state.archived_checksum_asset_count ?? 0)

          $currentAssetTotal = $archivedAssetTotal + $visibleAssetTotal
          $currentProductTotal = $archivedProductTotal + $visibleProductTotal
          $currentChecksumTotal = $archivedChecksumTotal + $visibleChecksumTotal
          $releaseCount = $archivedReleaseCount + $releases.Count
          $assetCount = $archivedAssetCount + $visibleAssetCount
          $productAssetCount = $archivedProductAssetCount + $visibleProductAssetCount
          $checksumAssetCount = $archivedChecksumAssetCount + $visibleChecksumAssetCount

          $previousAssetCurrent = [int]($state.last_seen_asset_total ?? $state.last_seen_current_total ?? $state.current_asset_downloads ?? $currentAssetTotal)
          $previousProductCurrent = [int]($state.last_seen_product_total ?? $state.current_product_downloads ?? $currentProductTotal)
          $previousChecksumCurrent = [int]($state.current_checksum_downloads ?? $currentChecksumTotal)
          $previousReleaseCount = [int]($state.release_count ?? $releaseCount)
          $previousAssetCount = [int]($state.asset_count ?? $assetCount)
          $previousProductAssetCount = [int]($state.product_asset_count ?? $productAssetCount)
          $previousChecksumAssetCount = [int]($state.checksum_asset_count ?? $checksumAssetCount)

          # GitHub drops asset download counts when a release is deleted. Preserve the
          # last observed totals as an archive baseline so public badges do not reset.
          if ($currentAssetTotal -lt $previousAssetCurrent) {
            $archivedAssetTotal += ($previousAssetCurrent - $currentAssetTotal)
            $currentAssetTotal = $previousAssetCurrent
          }

          if ($currentProductTotal -lt $previousProductCurrent) {
            $archivedProductTotal += ($previousProductCurrent - $currentProductTotal)
            $currentProductTotal = $previousProductCurrent
          }

          if ($currentChecksumTotal -lt $previousChecksumCurrent) {
            $archivedChecksumTotal += ($previousChecksumCurrent - $currentChecksumTotal)
            $currentChecksumTotal = $previousChecksumCurrent
          }

          if ($releaseCount -lt $previousReleaseCount) {
            $archivedReleaseCount += ($previousReleaseCount - $releaseCount)
            $releaseCount = $previousReleaseCount
          }

          if ($assetCount -lt $previousAssetCount) {
            $archivedAssetCount += ($previousAssetCount - $assetCount)
            $assetCount = $previousAssetCount
          }

          if ($productAssetCount -lt $previousProductAssetCount) {
            $archivedProductAssetCount += ($previousProductAssetCount - $productAssetCount)
            $productAssetCount = $previousProductAssetCount
          }

          if ($checksumAssetCount -lt $previousChecksumAssetCount) {
            $archivedChecksumAssetCount += ($previousChecksumAssetCount - $checksumAssetCount)
            $checksumAssetCount = $previousChecksumAssetCount
          }

          $previousAssetCumulative = [int]($state.cumulative_asset_downloads ?? $state.cumulative_downloads ?? $currentAssetTotal)
          $assetDelta = $currentAssetTotal - $previousAssetCurrent

          if ($assetDelta -lt 0) {
            $assetDelta = 0
          }

          $previousProductCumulative = [int]($state.cumulative_product_downloads ?? $currentProductTotal)
          $productDelta = $currentProductTotal - $previousProductCurrent

          if ($productDelta -lt 0) {
            $productDelta = 0
          }

          $updatedState = [ordered]@{
            current_product_downloads = $currentProductTotal
            cumulative_product_downloads = $previousProductCumulative + $productDelta
            current_asset_downloads = $currentAssetTotal
            cumulative_asset_downloads = $previousAssetCumulative + $assetDelta
            cumulative_downloads = $previousAssetCumulative + $assetDelta
            current_checksum_downloads = $currentChecksumTotal
            visible_product_downloads = $visibleProductTotal
            visible_asset_downloads = $visibleAssetTotal
            visible_checksum_downloads = $visibleChecksumTotal
            archived_product_downloads = $archivedProductTotal
            archived_asset_downloads = $archivedAssetTotal
            archived_checksum_downloads = $archivedChecksumTotal
            last_seen_product_total = $currentProductTotal
            last_seen_asset_total = $currentAssetTotal
            last_seen_current_total = $currentAssetTotal
            current_total_downloads = $currentAssetTotal
            release_count = $releaseCount
            visible_release_count = $releases.Count
            archived_release_count = $archivedReleaseCount
            asset_count = $assetCount
            visible_asset_count = $visibleAssetCount
            archived_asset_count = $archivedAssetCount
            product_asset_count = $productAssetCount
            visible_product_asset_count = $visibleProductAssetCount
            archived_product_asset_count = $archivedProductAssetCount
            checksum_asset_count = $checksumAssetCount
            visible_checksum_asset_count = $visibleChecksumAssetCount
            archived_checksum_asset_count = $archivedChecksumAssetCount
            updated_at = [DateTime]::UtcNow.ToString("o")
            source = "github-releases-assets-plus-archive"
            notes = "Product downloads count visible release assets ending in .exe, .zip, or .msi plus archived downloads from deleted releases. Checksum assets are excluded from product downloads."
          }

          $updatedState | ConvertTo-Json | Set-Content -Path $env:STATS_FILE -Encoding utf8

      - name: Commit updated stats
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/downloads.json

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: update cumulative download stats"
          git push
